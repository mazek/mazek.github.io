<footer class="site-footer">

  <div class="wrapper">
    <div class="footer-inner">
      <span class="footer-copy">© {{ site.time | date: "%Y" }} {{ site.name }}</span>
      <nav class="footer-links">
        {% if site.linkedin_username %}
        <a href="https://pl.linkedin.com/in/{{ site.linkedin_username }}/" target="_blank" rel="noopener">LinkedIn</a>
        {% endif %}
        {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        {% endif %}
        {% if site.twitter_username %}
        <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener">Twitter</a>
        {% endif %}
        {% if site.goodreads_url %}
        <a href="{{ site.goodreads_url }}" target="_blank" rel="noopener">Goodreads</a>
        {% endif %}
      </nav>
    </div>
  </div>

</footer>
